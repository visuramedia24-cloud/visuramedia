<!-- ====================================
     RESPONSIVE IMAGE TEMPLATES
     Use these patterns throughout your HTML
     ==================================== -->

<!-- ====================================
     TEMPLATE 1: Hero/Large Images
     Use for: Hero backgrounds, large feature images
     ==================================== -->
<picture>
  <source type="image/webp" 
          srcset="assets/images/hero-bg-800.webp 800w,
                  assets/images/hero-bg-1200.webp 1200w,
                  assets/images/hero-bg-1920.webp 1920w"
          sizes="100vw">
  <img src="assets/images/hero-bg.jpg" 
       width="1920" 
       height="1080"
       alt="Hero Background"
       class="w-full h-full object-cover"
       loading="eager"
       decoding="async"
       fetchpriority="high">
</picture>

<!-- ====================================
     TEMPLATE 2: Service Cards (Above Fold)
     Use for: Service cards, portfolio items visible on load
     ==================================== -->
<picture>
  <source type="image/webp" 
          srcset="assets/images/website-card-400.webp 400w,
                  assets/images/website-card-800.webp 800w,
                  assets/images/website-card-1200.webp 1200w"
          sizes="(max-width: 768px) 100vw, 
                 (max-width: 1024px) 50vw, 
                 33vw">
  <img src="assets/images/website card.webp" 
       width="1200" 
       height="800"
       alt="Website Development Service"
       class="w-full h-full object-cover"
       loading="eager"
       decoding="async">
</picture>

<!-- ====================================
     TEMPLATE 3: Below-Fold Images (Lazy Load)
     Use for: Process images, testimonials, portfolio items below fold

<picture>

          srcset="assets/images/process-1-400.webp 400w,

       class="w-full h-full object-cover"

<!-- ====================================
     QUICK REFERENCE: Image Attributes
     ==================================== -->
<!--
  width/height: Always specify to prevent CLS
  loading="eager": Above-fold images (hero, first 3 service cards)
  loading="lazy": Below-fold images (everything else)
  decoding="async": All images (non-blocking decode)
  fetchpriority="high": Only for LCP image (usually hero)
  
  sizes attribute examples:
  - Full width mobile, half on tablet, third on desktop:
    sizes="(max-width: 768px) 100vw, (max-width: 1024px) 50vw, 33vw"
  
  - Full width everywhere:
    sizes="100vw"
  
  - Fixed width:
    sizes="400px"
-->
