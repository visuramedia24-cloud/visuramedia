<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Burger - Ihr Feedback</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial Black', Impact, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Star Background */
        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.1;
        }

        .star {
            position: absolute;
            color: #D4AF37;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* Container */
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* Views */
        .view {
            display: none;
            animation: fadeIn 0.5s;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Landing Page */
        .landing {
            text-align: center;
            padding-top: 10vh;
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
        }

        .logo-circle {
            width: 140px;
            height: 140px;
            margin: 0 auto;
            border-radius: 50%;
            background: linear-gradient(135deg, #D4AF37, #F4A460);
            padding: 3px;
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.4);
        }

        .logo-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid rgba(212, 175, 55, 0.3);
        }

        .logo-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .star-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 35px;
            height: 35px;
            background: #D4AF37;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .restaurant-name {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #D4AF37, #F4A460, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .tagline {
            display: inline-block;
            background: linear-gradient(135deg, #FF6347, #FF4500);
            color: white;
            padding: 8px 20px;
            transform: rotate(-1deg);
            font-size: 14px;
            letter-spacing: 2px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .question {
            color: #999;
            font-size: 20px;
            margin: 30px 0;
            font-weight: normal;
            font-family: Arial, sans-serif;
        }

        /* Buttons */
        .feedback-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 40px;
        }

        .btn {
            position: relative;
            padding: 25px 30px;
            border: none;
            border-radius: 15px;
            font-size: 24px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-positive {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: 4px solid rgba(5, 150, 105, 0.5);
        }

        .btn-positive:hover {
            background: linear-gradient(135deg, #059669, #047857);
            box-shadow: 0 15px 40px rgba(16, 185, 129, 0.4);
        }

        .btn-negative {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: 4px solid rgba(220, 38, 38, 0.5);
        }

        .btn-negative:hover {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            box-shadow: 0 15px 40px rgba(239, 68, 68, 0.4);
        }

        .btn-icon {
            font-size: 28px;
        }

        /* Feedback Form */
        .feedback-form {
            background: #262626;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(212, 175, 55, 0.3);
            margin-top: 10vh;
        }

        .form-header {
            background: linear-gradient(135deg, #D4AF37, #F4A460);
            padding: 30px;
            text-align: center;
        }

        .form-header-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .form-header h2 {
            font-size: 28px;
            color: #1a1a1a;
            margin-bottom: 5px;
        }

        .form-header p {
            color: rgba(0, 0, 0, 0.7);
            font-size: 14px;
            font-weight: normal;
            font-family: Arial, sans-serif;
        }

        .form-body {
            padding: 30px;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 15px;
            background: #1a1a1a;
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-family: Arial, sans-serif;
            resize: none;
            margin-bottom: 10px;
        }

        textarea:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
        }

        textarea::placeholder {
            color: #666;
        }

        .char-count {
            text-align: right;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
            font-family: Arial, sans-serif;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #D4AF37, #F4A460);
            color: #1a1a1a;
            padding: 18px;
            border: 2px solid rgba(212, 175, 55, 0.5);
            font-size: 18px;
            font-weight: 900;
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #F4A460, #D4AF37);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-back {
            width: 100%;
            background: transparent;
            color: #999;
            padding: 15px;
            margin-top: 15px;
            font-size: 16px;
            font-weight: normal;
            border: none;
            box-shadow: none;
        }

        .btn-back:hover {
            color: white;
        }

        /* Thank You */
        .thank-you {
            text-align: center;
            padding-top: 15vh;
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 50px;
            box-shadow: 0 20px 60px rgba(16, 185, 129, 0.4);
            border: 4px solid rgba(5, 150, 105, 0.3);
            position: relative;
        }

        .success-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 35px;
            height: 35px;
            background: #D4AF37;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .thank-you h2 {
            font-size: 42px;
            background: linear-gradient(135deg, #D4AF37, #F4A460);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .thank-you p {
            color: #999;
            font-size: 18px;
            margin-bottom: 40px;
            font-family: Arial, sans-serif;
            font-weight: normal;
        }

        .btn-close {
            background: linear-gradient(135deg, #D4AF37, #F4A460);
            color: #1a1a1a;
            padding: 18px 40px;
            font-size: 18px;
            border: 2px solid rgba(212, 175, 55, 0.5);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .restaurant-name {
                font-size: 36px;
            }

            .btn {
                font-size: 20px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Star Background -->
    <div class="stars" id="stars"></div>

    <!-- Landing View -->
    <div id="landingView" class="view active">
        <div class="container">
            <div class="landing">
                <div class="logo-wrapper">
                    <div class="logo-circle">
                        <div class="logo-inner">
                            <img src="../images/icons/Logo Prime Burger.jpg" alt="Prime Burger Logo">
                        </div>
                    </div>
                    <div class="star-badge">⭐</div>
                </div>
                
                <h1 class="restaurant-name">PRIME BURGER</h1>
                <div class="tagline">GRILL & BAR</div>
                
                <p class="question">Wie war Ihr Erlebnis?</p>
                
                <div class="feedback-buttons">
                    <button class="btn btn-positive" onclick="handlePositiveFeedback()">
                        <span class="btn-icon">👍</span>
                        <span>Es war großartig!</span>
                    </button>
                    
                    <button class="btn btn-negative" onclick="showNegativeForm()">
                        <span class="btn-icon">👎</span>
                        <span>Es war nicht gut</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Negative Feedback Form -->
    <div id="feedbackFormView" class="view">
        <div class="container">
            <div class="feedback-form">
                <div class="form-header">
                    <div class="form-header-icon">💬</div>
                    <h2>DAS TUT UNS LEID</h2>
                    <p>Helfen Sie uns besser zu werden</p>
                </div>
                
                <div class="form-body">
                    <textarea 
                        id="feedbackMessage" 
                        placeholder="Was ist schiefgelaufen? Ihr Feedback ist uns wichtig..."
                        maxlength="500"
                        oninput="updateCharCount()"></textarea>
                    
                    <div class="char-count">
                        <span id="charCount">0</span>/500
                    </div>
                    
                    <button class="btn btn-submit" onclick="submitFeedback()">
                        FEEDBACK SENDEN
                    </button>
                    
                    <button class="btn btn-back" onclick="showLanding()">
                        Zurück
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Thank You View -->
    <div id="thankYouView" class="view">
        <div class="container">
            <div class="thank-you">
                <div class="success-icon">
                    ✓
                    <div class="success-badge">⭐</div>
                </div>
                
                <h2>VIELEN DANK!</h2>
                <p>Ihr Feedback hilft uns, noch besser zu werden</p>
                
                <button class="btn btn-close" onclick="showLanding()">
                    SCHLIESSEN
                </button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const GOOGLE_MAPS_URL = 'https://www.google.com/maps/place/PRIME+BURGER+LEIPZIG/@51.3226873,12.2249149,12z/data=!3m1!5s0x47a6f821a82249ef:0x809adb148bb88864!4m12!1m2!2m1!1sprime+burger!3m8!1s0x47a6f82054757e65:0x47bd57f85449c749!8m2!3d51.3430199!4d12.3725626!9m1!1b1!15sCgxwcmltZSBidXJnZXIiA4gBAVoOIgxwcmltZSBidXJnZXKSARRoYW1idXJnZXJfcmVzdGF1cmFudJoBJENoZERTVWhOTUc5blMwVkpRMEZuU1VSWGMyTlRNMnRuUlJBQqoBUAoIL20vMGNkbjEQASoQIgxwcmltZSBidXJnZXIoADIeEAEiGpRbJHeBTJIdqGIs1anzcWY0tjx-R9a_74ndMhAQAiIMcHJpbWUgYnVyZ2Vy4AEA-gEECAAQSQ!16s%2Fg%2F11c53nzsnh?entry=ttu&g_ep=EgoyMDI1MTAyMC4wIKXMDSoASAFQAw%3D%3D'; 
        const RESTAURANT_NAME = 'Prime Burger';
        const RESTAURANT_TAGLINE = 'GRILL & BAR';

        let feedbackData = [];

        // Initialize
        function init() {
            loadFeedback();
            generateStars();
        }

        // Generate star background
        function generateStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 20; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.innerHTML = '⭐';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.fontSize = (12 + Math.random() * 8) + 'px';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }

        // View management
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(view => {
                view.classList.remove('active');
            });
            document.getElementById(viewId).classList.add('active');
        }

        function showLanding() {
            showView('landingView');
        }

        function showNegativeForm() {
            showView('feedbackFormView');
            document.getElementById('feedbackMessage').value = '';
            updateCharCount();
            
            // Reset submit button
            const submitBtn = document.querySelector('.btn-submit');
            submitBtn.disabled = false;
            submitBtn.textContent = 'FEEDBACK SENDEN';
        }

        function showThankYou() {
            showView('thankYouView');
        }

        // Feedback handling
        function handlePositiveFeedback() {
            window.open(GOOGLE_MAPS_URL, '_blank');
            showThankYou();
        }

        function updateCharCount() {
            const textarea = document.getElementById('feedbackMessage');
            const count = document.getElementById('charCount');
            count.textContent = textarea.value.length;
            
            const submitBtn = document.querySelector('.btn-submit');
            submitBtn.disabled = textarea.value.trim().length === 0;
        }

        async function submitFeedback() {
            const message = document.getElementById('feedbackMessage').value.trim();
            if (!message) return;

            // Disable submit button to prevent double submission
            const submitBtn = document.querySelector('.btn-submit');
            submitBtn.disabled = true;
            submitBtn.textContent = 'WIRD GESENDET...';

            const feedback = {
                message: message,
                timestamp: Date.now(),
                date: new Date().toLocaleString('de-DE')
            };

            // Save to localStorage as backup
            feedbackData.unshift(feedback);
            saveFeedback();

            // Send to Formspree
            try {
                const response = await fetch('https://formspree.io/f/xblzeely', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        date: feedback.date,
                        source: 'Prime Burger Feedback QR Code'
                    })
                });

                if (response.ok) {
                    console.log('Feedback sent successfully to Formspree');
                } else {
                    console.warn('Formspree submission failed, but saved locally');
                }
            } catch (error) {
                console.error('Error sending to Formspree:', error);
                console.log('Feedback saved locally as backup');
            }

            // Show thank you message regardless of Formspree status
            showThankYou();
        }

        // Storage functions
        function loadFeedback() {
            const saved = localStorage.getItem('primeburger_feedback');
            if (saved) {
                try {
                    feedbackData = JSON.parse(saved);
                } catch (e) {
                    feedbackData = [];
                }
            }
        }

        function saveFeedback() {
            localStorage.setItem('primeburger_feedback', JSON.stringify(feedbackData));
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
